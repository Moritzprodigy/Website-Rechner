</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#00C853;--gd:#00A344;--gg:rgba(0,200,83,0.25);--bg:#0D0D0D;--card:#1A1A1A;--cb:rgba(255,255,255,0.08);--tx:#F5F5F5;--txm:rgba(245,245,245,0.5);--red:#FF3B30;--orange:#FF9500;--r:16px}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Plus Jakarta Sans',-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 0%,rgba(0,200,83,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(0,200,83,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;width:100%;max-width:1400px;margin:0 auto;padding:2vh 4vw 2vh;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#app.fi{opacity:1;transform:translateY(0);transition:opacity .3s,transform .3s}
#app.fo{opacity:0;transform:translateY(10px);transition:opacity .2s,transform .2s}
.progress{display:flex;gap:8px;justify-content:center;margin-bottom:36px;width:100%;max-width:320px}
.pd{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,0.08);transition:background .4s}.pd.a{background:var(--g)}
.headline{font-size:clamp(36px,5vw,56px);font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:14px;text-align:center;color:#fff}.headline .ac{color:var(--g)}
.sub{font-size:19px;color:var(--txm);text-align:center}
.q{font-size:clamp(26px,3.5vw,38px);font-weight:700;line-height:1.25;letter-spacing:-.5px;margin-bottom:32px;text-align:center;color:#fff}
.sl{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--g);margin-bottom:12px}
.sc{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%}.sc-vc{margin:auto 0}
.mr{display:flex;gap:16px;margin-top:44px;flex-wrap:wrap;justify-content:center;width:100%}
.mb{flex:1;min-width:360px;max-width:500px;border:2px solid var(--cb);border-radius:20px;padding:32px 28px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:14px;background:var(--card);transition:all .2s;font-family:inherit;color:#fff}
.mb:active{transform:scale(.97)}.mb.gn:hover,.mb.gn:active{border-color:var(--g);background:rgba(0,200,83,0.08)}.mb.rd:hover,.mb.rd:active{border-color:var(--red);background:rgba(255,59,48,0.08)}
.mb .mi{font-size:40px}.mb .ml{font-size:20px;font-weight:700;line-height:1.3}.mb .ms{font-size:14px;color:var(--txm)}
.og{display:flex;flex-direction:column;gap:12px;width:100%;max-width:800px}
.ob{background:var(--card);border:2px solid var(--cb);border-radius:var(--r);padding:20px 24px;font-size:21px;font-weight:600;color:var(--tx);cursor:pointer;transition:all .2s;text-align:center;font-family:inherit}
.ob:active{transform:scale(.98)}.ob.a{border-color:var(--g);background:rgba(0,200,83,0.1);color:#fff}
.tr{margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.tb{background:var(--card);border:2px solid var(--cb);border-radius:12px;padding:14px 22px;font-size:17px;font-weight:500;color:var(--tx);cursor:pointer;transition:all .2s;font-family:inherit}.tb.a{border-color:var(--g);background:rgba(0,200,83,0.1)}
.ti{width:100%;max-width:800px;padding:20px 24px;font-size:21px;font-weight:500;background:var(--card);border:2px solid var(--cb);border-radius:var(--r);color:#fff;outline:none;font-family:inherit;text-align:center;transition:border .2s}.ti::placeholder{color:rgba(255,255,255,0.25)}.ti:focus{border-color:var(--g)}
.th{font-size:14px;color:var(--txm);margin-top:12px}
.bp{background:var(--g);border:none;border-radius:var(--r);padding:18px 48px;font-size:19px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 4px 20px var(--gg)}.bp:active{transform:scale(.97)}.bp:disabled{opacity:.3;box-shadow:none}
.bg2{background:var(--card);border:2px solid var(--cb);border-radius:var(--r);padding:16px 32px;font-size:17px;font-weight:600;color:var(--tx);cursor:pointer;font-family:inherit;transition:all .2s}
.lk{background:none;border:none;color:var(--txm);font-size:15px;cursor:pointer;padding:8px;font-family:inherit}
.sv{font-size:clamp(40px,7vw,58px);font-weight:800;color:#fff;margin:28px 0 12px;letter-spacing:-1px}
.slider-wrap{width:100%;max-width:800px;position:relative;padding:0 4px}
input[type="range"]{width:100%;height:8px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.08);border-radius:4px;outline:none;cursor:pointer;margin:0;display:block;touch-action:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:48px;height:48px;border-radius:50%;cursor:pointer;background:var(--g);box-shadow:0 2px 16px var(--gg);margin-top:-20px;border:3px solid #fff}
input[type="range"]::-webkit-slider-runnable-track{height:8px;border-radius:4px;background:rgba(255,255,255,0.08)}
input[type="range"]::-moz-range-thumb{width:48px;height:48px;border:3px solid #fff;border-radius:50%;background:var(--g);box-shadow:0 2px 16px var(--gg);cursor:pointer}
input[type="range"]::-moz-range-track{height:8px;border-radius:4px;background:rgba(255,255,255,0.08);border:none}
.slab{display:flex;justify-content:space-between;width:100%;max-width:800px;color:var(--txm);font-size:13px;margin-top:6px}
.rl{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--txm);margin-bottom:8px}
.rb{font-size:clamp(56px,10vw,84px);font-weight:800;letter-spacing:-3px;line-height:1}
.rte{font-size:16px;color:var(--txm);margin-top:2px;margin-bottom:10px;font-weight:500;font-style:italic}
.gauge{width:280px;height:150px;margin:8px auto 20px}
.rbdg{font-size:18px;font-weight:700;padding:10px 28px;border-radius:30px;display:inline-block;margin-bottom:24px}
.rg{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.ri{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:14px 18px;min-width:135px;display:flex;flex-direction:column;gap:6px}
.ril{font-size:11px;color:var(--txm);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.riv{font-size:22px;font-weight:800;color:#fff}
.rsub{font-size:17px;color:var(--txm);margin-top:6px;margin-bottom:16px}
.cc{width:100%;max-width:800px;margin-top:16px;background:var(--card);border:2px solid var(--cb);border-radius:20px;padding:24px 28px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit;color:#fff}.cc:hover{border-color:var(--g)}
.cc .ci{font-size:28px;margin-bottom:8px}.cc .ct{font-size:19px;font-weight:700;line-height:1.3}
.bk{position:fixed;bottom:28px;left:28px;background:var(--card);border:1px solid var(--cb);border-radius:12px;padding:12px 24px;font-size:15px;color:var(--txm);cursor:pointer;z-index:10;font-family:inherit}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.oc{background:#141414;border-radius:24px;padding:36px 32px;max-width:580px;width:100%;text-align:center;border:1px solid var(--cb);max-height:90vh;overflow-y:auto}
.oc h2{font-size:24px;margin-bottom:6px;color:#fff}.oc .os{font-size:15px;color:var(--txm);margin-bottom:24px}
.inf{width:100%;padding:16px 20px;font-size:17px;background:var(--card);border:2px solid var(--cb);border-radius:12px;color:#fff;margin-bottom:12px;outline:none;font-family:inherit}.inf::placeholder{color:rgba(255,255,255,0.25)}.inf:focus{border-color:var(--g)}
.br{display:flex;gap:12px;margin-top:8px}.br>*{flex:1}
.ap{text-align:left}.ap h2{text-align:center;margin-bottom:20px}
.lc2{font-size:52px;font-weight:800;text-align:center;color:var(--g);margin-bottom:20px}
.le{background:var(--card);border-radius:12px;padding:14px 18px;margin-bottom:8px;border-left:4px solid var(--g)}
.le .ln{font-size:17px;font-weight:700;color:#fff}.le .lm{font-size:13px;color:var(--txm);margin-top:3px}
.eb{background:var(--g);border:none;border-radius:var(--r);padding:16px 28px;font-size:17px;font-weight:700;color:#000;cursor:pointer;width:100%;margin-top:16px;font-family:inherit}
.clb{background:rgba(255,59,48,0.1);border:2px solid rgba(255,59,48,0.25);border-radius:var(--r);padding:14px 28px;font-size:15px;font-weight:600;color:var(--red);cursor:pointer;width:100%;margin-top:8px;font-family:inherit}
.cb-row{display:flex;align-items:flex-start;gap:14px;width:100%;text-align:left;margin:16px 0 6px;padding:16px 18px;background:rgba(0,200,83,0.06);border:2px solid rgba(0,200,83,0.2);border-radius:14px;cursor:pointer;transition:all .2s}
.cb-row:hover{border-color:var(--g)}
.cb-row input[type="checkbox"]{width:22px;height:22px;margin-top:2px;accent-color:var(--g);flex-shrink:0;cursor:pointer}
.cb-row .cb-text{flex:1}
.cb-row .cb-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px}
.cb-row .cb-desc{font-size:13px;color:var(--txm);line-height:1.4}
.prem-card{width:100%;max-width:800px;margin-top:12px;background:linear-gradient(135deg,rgba(0,200,83,0.08),rgba(0,200,83,0.02));border:2px solid rgba(0,200,83,0.25);border-radius:20px;padding:24px 24px 20px;text-align:center}
.prem-card .prem-icon{font-size:32px;margin-bottom:8px}
.prem-card .prem-title{font-size:19px;font-weight:700;color:#fff;margin-bottom:6px}
.prem-card .prem-desc{font-size:14px;color:var(--txm);line-height:1.5;margin-bottom:16px}
.prem-card .prem-items{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.prem-card .prem-item{font-size:12px;font-weight:600;color:var(--g);background:rgba(0,200,83,0.1);padding:6px 14px;border-radius:20px}
.cmp-wrap{width:100%;max-width:800px;margin:20px 0 8px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.cmp-gauge{flex:1;min-width:260px;max-width:320px;text-align:center}
.cmp-gauge .cg-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.cmp-gauge .cg-val{font-size:clamp(36px,6vw,48px);font-weight:800;line-height:1;margin-top:0}
.cmp-gauge .cg-sub{font-size:12px;color:var(--txm);margin-top:4px}
.cmp-warn{text-align:center;margin:10px 0 4px;padding:10px 20px;background:rgba(255,59,48,0.08);border:1px solid rgba(255,59,48,0.2);border-radius:14px;font-size:15px;color:rgba(255,255,255,0.7);line-height:1.5}
.cmp-warn strong{color:#FF3B30;font-weight:700}
.cmp-boost{text-align:center;margin:4px 0 10px;padding:10px 20px;background:rgba(0,200,83,0.08);border:1px solid rgba(0,200,83,0.2);border-radius:14px;font-size:15px;color:rgba(255,255,255,0.7);line-height:1.5}
.cmp-boost strong{color:#00C853;font-weight:700}
.usp-section{width:100%;max-width:800px;margin-top:14px;margin-bottom:4px}
.usp-title{font-size:22px;font-weight:800;letter-spacing:0.5px;color:var(--g);text-align:center;margin-bottom:20px}
.usp-grid{display:flex;flex-direction:column;gap:6px}
.usp-item{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:14px 20px;transition:all .2s}
.usp-item .usp-icon{font-size:32px;flex-shrink:0;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:rgba(0,200,83,0.1);border-radius:14px}
.usp-item .usp-text{flex:1}
.usp-item .usp-h{font-size:19px;font-weight:700;color:#fff;margin-bottom:4px}
.usp-item .usp-d{font-size:15px;color:var(--txm);line-height:1.45}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--g);color:#000;padding:14px 32px;border-radius:14px;font-size:17px;font-weight:700;box-shadow:0 8px 32px var(--gg);z-index:200;animation:tin .3s ease,tout .3s ease 2.2s forwards}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(20px)}}
.pm{width:48px;height:48px;border-radius:12px;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#000;margin-bottom:36px}
.pw{position:fixed;bottom:12px;right:20px;font-size:11px;color:rgba(255,255,255,0.2);z-index:5}
</style>

// Storage
var SK="prodigy_messe_leads";
function getLeads(){try{return JSON.parse(localStorage.getItem(SK)||"[]")}catch(e){return[]}}
function saveLead(l){l.timestamp=new Date().toISOString();l.id=Date.now();var ls=getLeads();ls.push(l);localStorage.setItem(SK,JSON.stringify(ls))}
function clearLeads(){localStorage.removeItem(SK)}
function exportCSV(){
  var ls=getLeads();if(!ls.length)return alert("Keine Leads.");
  var hd=["Zeitpunkt","Name","Firma","E-Mail","Telefon","Stellentitel","Stadt","Vakanzdauer","Weg","Ergebnis","Details","Erweiterte Analyse"];
  var rows=ls.map(function(l){return[new Date(l.timestamp).toLocaleString("de-DE"),l.name||"",l.firma||"",l.email||"",l.telefon||"",l.stellentitel||"",l.stadt||"",l.vakanzdauer||"-",l.weg===1?"Besetzungspotenzial":"Vakanzkosten",l.ergebnis||"",l.details||"",l.erweiterteAnalyse?"Ja":"Nein"]});
  var csv="\uFEFF"+[hd].concat(rows).map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"'}).join(";")}).join("\n");
  var b=new Blob([csv],{type:"text/csv;charset=utf-8;"});var u=URL.createObjectURL(b);
  var aa=document.createElement("a");aa.href=u;aa.download="prodigy_leads_"+new Date().toISOString().slice(0,10)+".csv";aa.click();URL.revokeObjectURL(u);
}

// Calc
function calcPot(a){
  // "Ohne prodigy" - deliberately low to show tough market
  var p={fachkraft:55,spezialist:40,fuehrung:30,clevel:18},o={metro:45,mittel:55,laendlich:35};
  var g={unter:-12,markt:0,ueber:8},v={neu:5,kurz:0,mittel:-8,lang:-18};
  var r=((p[a.position]||40)+(o[a.standort]||45)+(a.remote?8:0)+(g[a.gehalt]||0)+(v[a.vakanz]||0))/1.6;
  return Math.max(8,Math.min(55,Math.round(r)));
}
function calcPotProdigy(ohne,a){
  // "Mit prodigy" - significant deterministic boost based on position difficulty
  var boost={fachkraft:28,spezialist:30,fuehrung:33,clevel:35};
  return Math.min(95,ohne+(boost[a.position]||30));
}
function getKonkurrenz(a){
  // Always show high competition
  var base={metro:"Sehr hoch",mittel:"Hoch",laendlich:"Hoch"};
  if(a.position==="clevel"||a.position==="fuehrung") return "Extrem hoch";
  return base[a.standort]||"Hoch";
}
function calcVak(a){
  var f={fachkraft:.75,spezialist:1,fuehrung:1.5,clevel:2.5},m={kurz:2,mittel:4,lang:7};
  var jg=a.jahresgehalt||85000,mg=jg/12,fk=f[a.position]||1,mon=m[a.vakanz]||3;
  var vk=Math.round(mg*mon*.33*fk),pk=Math.round(mg*mon*.45),sk=a.fehlbesetzung?Math.round(jg*.25):0;
  return{vakanzkosten:vk,produktivitaet:pk,suchkosten:sk,gesamt:vk+pk+sk,prozent:Math.round((vk+pk+sk)/jg*100)};
}
var ML={fachkraft:"Gross",spezialist:"Mittel",fuehrung:"Klein",clevel:"Sehr klein"};
var KL={metro:"Sehr hoch",mittel:"Hoch",laendlich:"Moderat"};
var WL={unter:"Gering",markt:"Gut",ueber:"Sehr gut"};
var PL={fachkraft:"Fachkraft",spezialist:"Spezialist",fuehrung:"Fuehrungskraft",clevel:"C-Level"};
function fmt(n){return n.toLocaleString("de-DE")}

// State
var S={weg:null,step:0,answers:{},showResult:false,showMail:false,showAdmin:false,fadeIn:true};
function setState(u){for(var k in u)S[k]=u[k];render()}
function transition(fn){setState({fadeIn:false});setTimeout(function(){fn();setState({fadeIn:true})},250)}
function pick(k,v,adv){
  S.answers[k]=v;
  if(adv!==false){if(S.step<4)transition(function(){S.step++});else transition(function(){S.showResult=true})}
  else render();
}
function reset(){transition(function(){S.weg=null;S.step=0;S.answers={};S.showResult=false})}
function switchWeg(w){transition(function(){S.weg=w;S.step=0;S.answers={};S.showResult=false})}

// Counter
var ctrs={};
function animC(id,tgt,suf){
  if(ctrs[id]&&ctrs[id].t===tgt)return;ctrs[id]={t:tgt};var t0=performance.now();
  function tk(now){var p=Math.min((now-t0)/1600,1),e=1-Math.pow(1-p,3),el=document.getElementById(id);
    if(el)el.textContent=fmt(Math.round(e*tgt))+(suf||"");if(p<1)requestAnimationFrame(tk)}
  requestAnimationFrame(tk);
}

// Gauge
function gaugeH(v,color,gid){
  var c=color||"#00C853";
  var id=gid||"g0";
  // needle starts at 0, animates to target via JS
  return '<svg viewBox="0 0 240 130" width="240" height="130">'+
    '<path d="M18 120 A102 102 0 0 1 222 120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="14" stroke-linecap="round"/>'+
    '<path d="M18 120 A102 102 0 0 1 222 120" fill="none" stroke="'+c+'" stroke-width="14" stroke-linecap="round" id="arc-'+id+'" stroke-dasharray="0 320" style="transition:stroke-dasharray 1.6s cubic-bezier(.22,1,.36,1)"/>'+
    '<line x1="120" y1="120" x2="46" y2="120" stroke="white" stroke-width="3" stroke-linecap="round" id="needle-'+id+'" style="transition:transform 1.6s cubic-bezier(.22,1,.36,1);transform-origin:120px 120px;transform:rotate(0deg)"/>'+
    '<circle cx="120" cy="120" r="5" fill="white"/>'+
    '</svg>';
}
function animGauge(gid,v){
  var arc=document.getElementById("arc-"+gid);
  var needle=document.getElementById("needle-"+gid);
  if(arc) arc.setAttribute("stroke-dasharray",(v/100*320)+" 320");
  if(needle){
    var deg=(v/100)*180;
    needle.style.transform="rotate("+deg+"deg)";
  }
}

// PDF
function generatePDF(){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({unit:"mm",format:"a4"});
  var a=S.answers,W=210,y=25;

  doc.setFillColor(13,13,13);doc.rect(0,0,W,45,"F");
  doc.setFillColor(0,200,83);doc.roundedRect(20,12,12,12,3,3,"F");
  doc.setTextColor(0,0,0);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("p",23.8,21.2);
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.text("prodigy",36,21);
  doc.setFontSize(9);doc.setTextColor(160,160,160);doc.text("Besetzungsanalyse",36,28);
  doc.setFontSize(8);doc.text(new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"}),W-20,21,{align:"right"});

  y=55;
  if(a.stellentitel){
    doc.setFontSize(11);doc.setTextColor(160,160,160);doc.text("Analyse fuer:",20,y);
    doc.setTextColor(50,50,50);doc.setFont("helvetica","bold");doc.setFontSize(16);
    doc.text(a.stellentitel,20,y+8);doc.setFont("helvetica","normal");y+=22;
  }
  doc.setFontSize(9);doc.setTextColor(160,160,160);
  doc.text("Positionsart: "+(PL[a.position]||"-")+(a.stadt?" | Standort: "+a.stadt:""),20,y);y+=12;

  if(S.weg===1){
    var ohne=calcPot(a);
    var mit=calcPotProdigy(ohne,a);
    var konk=getKonkurrenz(a);

    // Competition warning
    doc.setFillColor(255,240,240);doc.roundedRect(20,y,W-40,14,3,3,"F");
    doc.setFontSize(10);doc.setTextColor(255,59,48);doc.setFont("helvetica","bold");
    doc.text("Wettbewerbsintensitaet: "+konk+" - Diese Position ist stark umkaempft.",W/2,y+9,{align:"center"});
    doc.setFont("helvetica","normal");y+=22;

    // Section: Ohne prodigy
    doc.setFontSize(11);doc.setTextColor(160,160,160);doc.text("OHNE PRODIGY",20,y);y+=8;
    doc.setFillColor(240,240,240);doc.roundedRect(20,y,W-40,16,4,4,"F");
    var bwOhne=Math.max(20,(W-40)*(ohne/100));
    doc.setFillColor(255,59,48);doc.roundedRect(20,y,bwOhne,16,4,4,"F");
    doc.setFontSize(14);doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");
    doc.text(ohne+" %",20+bwOhne-4,y+11,{align:"right"});
    doc.setFont("helvetica","normal");y+=24;

    // Section: Mit prodigy
    doc.setFontSize(11);doc.setTextColor(0,200,83);doc.setFont("helvetica","bold");doc.text("MIT PRODIGY",20,y);
    doc.setFont("helvetica","normal");y+=8;
    doc.setFillColor(240,240,240);doc.roundedRect(20,y,W-40,16,4,4,"F");
    var bwMit=Math.max(20,(W-40)*(mit/100));
    doc.setFillColor(0,200,83);doc.roundedRect(20,y,bwMit,16,4,4,"F");
    doc.setFontSize(14);doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");
    doc.text(mit+" %",20+bwMit-4,y+11,{align:"right"});
    doc.setFont("helvetica","normal");y+=24;

    // Boost
    doc.setFillColor(235,255,245);doc.roundedRect(20,y,W-40,12,3,3,"F");
    doc.setFontSize(10);doc.setTextColor(0,163,68);doc.setFont("helvetica","bold");
    doc.text("+"+(mit-ohne)+" % hoehere Besetzungswahrscheinlichkeit mit prodigy",W/2,y+8,{align:"center"});
    doc.setFont("helvetica","normal");y+=20;

    // Detail cards
    doc.setDrawColor(220,220,220);doc.line(20,y,W-20,y);y+=12;
    var items=[["Konkurrenzdruck",konk],["Marktgroesse",ML[a.position]||"Mittel"],["Wechselbereitschaft",WL[a.gehalt]||"Gut"]];
    var cw=(W-40)/3-4;
    items.forEach(function(it,i){
      var cx=20+i*(cw+6);
      doc.setFillColor(245,245,245);doc.roundedRect(cx,y,cw,28,3,3,"F");
      doc.setFontSize(8);doc.setTextColor(160,160,160);doc.text(it[0].toUpperCase(),cx+cw/2,y+10,{align:"center"});
      doc.setFontSize(13);doc.setTextColor(30,30,30);doc.setFont("helvetica","bold");
      doc.text(it[1],cx+cw/2,y+22,{align:"center"});doc.setFont("helvetica","normal");
    });y+=40;
  }else{
    var r=calcVak(a);
    doc.setFontSize(12);doc.setTextColor(160,160,160);doc.text("IHR POTENZIELLER SCHADEN",W/2,y,{align:"center"});y+=14;
    doc.setFontSize(48);doc.setTextColor(255,59,48);doc.setFont("helvetica","bold");
    doc.text(fmt(r.gesamt)+" EUR",W/2,y,{align:"center"});y+=8;
    doc.setFontSize(12);doc.setTextColor(160,160,160);doc.setFont("helvetica","normal");
    doc.text("ca. "+r.prozent+" % eines Jahresgehalts",W/2,y,{align:"center"});y+=18;
    doc.setDrawColor(220,220,220);doc.line(20,y,W-20,y);y+=12;
    var it2=[["Vakanzkosten",r.vakanzkosten],["Produktivitaetsverlust",r.produktivitaet]];
    if(r.suchkosten>0)it2.push(["Erneute Suchkosten",r.suchkosten]);
    var cw2=(W-40)/it2.length-4;
    it2.forEach(function(it,i){
      var cx=20+i*(cw2+4);
      doc.setFillColor(245,245,245);doc.roundedRect(cx,y,cw2,28,3,3,"F");
      doc.setFontSize(8);doc.setTextColor(160,160,160);doc.text(it[0].toUpperCase(),cx+cw2/2,y+10,{align:"center"});
      doc.setFontSize(14);doc.setTextColor(30,30,30);doc.setFont("helvetica","bold");
      doc.text(fmt(it[1])+" EUR",cx+cw2/2,y+22,{align:"center"});doc.setFont("helvetica","normal");
    });y+=40;
    doc.setDrawColor(220,220,220);doc.line(20,y,W-20,y);y+=10;
    doc.setFontSize(9);doc.setTextColor(80,80,80);
    var vl={kurz:"< 2 Monate",mittel:"2-4 Monate",lang:"> 4 Monate"};
    doc.text("Basis: Jahresgehalt "+fmt(a.jahresgehalt||85000)+" EUR, Vakanzdauer "+(vl[a.vakanz]||"-")+(a.fehlbesetzung?", inkl. Nachbesetzungskosten":""),20,y);
  }

  y=Math.max(y+14,235);
  doc.setFillColor(0,200,83);doc.roundedRect(20,y,W-40,22,4,4,"F");
  doc.setFontSize(11);doc.setTextColor(0,0,0);doc.setFont("helvetica","bold");
  doc.text("Jetzt Demo buchen: prodigy-consulting.de/live-demo-vereinbaren",W/2,y+14,{align:"center"});
  doc.setFont("helvetica","normal");
  doc.setFillColor(240,240,240);doc.rect(0,280,W,17,"F");
  doc.setFontSize(7);doc.setTextColor(150,150,150);
  doc.text("prodigy Consulting GmbH | kontakt@prodigy-consulting.de | prodigy-consulting.de",W/2,289,{align:"center"});

  var fn="prodigy_analyse_"+(a.stellentitel||"analyse").replace(/[^a-zA-Z0-9]/g,"_").substring(0,30)+"_"+new Date().toISOString().slice(0,10)+".pdf";
  doc.save(fn);
}

// Fix pick for position buttons (step 0)
var origPick=pick;
pick=function(k,v,adv){
  if(k==="position"||k==="fehlbesetzung"||k==="vakanz"||k==="gehalt"||k==="standort"||k==="remote"||k==="jahresgehalt"){
    S.answers[k]=v;
    if(adv!==false){if(S.step<4)transition(function(){S.step++});else transition(function(){S.showResult=true})}
    else render();
  }
};

function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
}
function validatePhone(phone){
  var cleaned=phone.replace(/[\s\-\/\(\)\.]/g,"");
  if(/^\+/.test(cleaned)) cleaned=cleaned.substring(1);
  return /^\d{6,15}$/.test(cleaned);
}

function submitLead(){
  var n=document.getElementById("ml-n").value.trim(),e=document.getElementById("ml-e").value.trim();
  var f=document.getElementById("ml-f").value.trim(),t=document.getElementById("ml-t").value.trim();
  var ext=document.getElementById("ml-ext").checked;
  var eErr=document.getElementById("ml-e-err"),tErr=document.getElementById("ml-t-err");
  var valid=true;

  eErr.style.display="none";tErr.style.display="none";

  if(!n||!f){alert("Bitte Name und Firma ausfuellen.");return}

  if(!e){eErr.textContent="Bitte E-Mail-Adresse eingeben.";eErr.style.display="block";valid=false}
  else if(!validateEmail(e)){eErr.textContent="Bitte eine gueltige E-Mail-Adresse eingeben.";eErr.style.display="block";valid=false}

  if(!t){tErr.textContent="Bitte Telefonnummer eingeben.";tErr.style.display="block";valid=false}
  else if(!validatePhone(t)){tErr.textContent="Bitte eine gueltige Telefonnummer eingeben (min. 6 Ziffern).";tErr.style.display="block";valid=false}

  if(!valid)return;

  var a=S.answers,ergebnis,details;
  if(S.weg===1){var ohneL=calcPot(a),mitL=calcPotProdigy(ohneL,a);ergebnis="Ohne:"+ohneL+"% / Mit prodigy:"+mitL+"%";details="Konkurrenz:"+getKonkurrenz(a)+",Markt:"+(ML[a.position]||"-")+",Wechsel:"+(WL[a.gehalt]||"-")}
  else{var r=calcVak(a);ergebnis=fmt(r.gesamt)+" EUR Schaden";details="Vakanz:"+fmt(r.vakanzkosten)+" EUR,Prod:"+fmt(r.produktivitaet)+" EUR,Such:"+fmt(r.suchkosten)+" EUR"}
  var VL2={neu:"Noch nicht ausgeschrieben",kurz:"< 2 Monate",mittel:"2-4 Monate",lang:"> 4 Monate"};
  var leadData={name:n,firma:f,email:e,telefon:t,stellentitel:a.stellentitel||"",stadt:a.stadt||"",vakanzdauer:VL2[a.vakanz]||"-",weg:S.weg,ergebnis:ergebnis,details:details,erweiterteAnalyse:ext};
  saveLead(leadData);
  sendToN8n(leadData);
  generatePDF();
  document.getElementById("ml-ov").remove();S.showMail=false;
  showToast("\u2713 Analyse gesendet!");
  setTimeout(function(){reset()},3000);
}

// n8n Webhook
var N8N_WEBHOOK="https://prodigy-consulting.app.n8n.cloud/webhook/3ca1217a-309f-4429-bf66-2dcc7c5b85de";
function sendToN8n(lead){
  try{
    fetch(N8N_WEBHOOK,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name:lead.name,
        firma:lead.firma,
        email:lead.email,
        telefon:lead.telefon,
        stellentitel:lead.stellentitel||"",
        stadt:lead.stadt||"",
        vakanzdauer:lead.vakanzdauer||"",
        weg:lead.weg===1?"Besetzungspotenzial":"Vakanzkosten",
        ergebnis:lead.ergebnis,
        details:lead.details,
        erweiterteAnalyse:lead.erweiterteAnalyse,
        timestamp:new Date().toISOString()
      })
    }).catch(function(){});
  }catch(ex){}
}
function showToast(m){var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2600)}
