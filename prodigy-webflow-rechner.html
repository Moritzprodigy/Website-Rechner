<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>prodigy Besetzungsrechner</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#00C853;--gd:#00A344;--gg:rgba(0,200,83,0.25);--card:rgba(0,0,0,0.04);--cb:rgba(0,0,0,0.08);--tx:#1A1A1A;--txm:rgba(0,0,0,0.5);--red:#FF3B30;--orange:#FF9500;--r:16px}
html,body{height:100%;overflow-x:hidden;background:transparent;color:var(--tx);font-family:'Plus Jakarta Sans',-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
#app{width:100%;max-width:700px;margin:0 auto;padding:32px 20px 60px;display:flex;flex-direction:column;align-items:center}
#app.fi{opacity:1;transform:translateY(0);transition:opacity .3s,transform .3s}
#app.fo{opacity:0;transform:translateY(10px);transition:opacity .2s,transform .2s}
.progress{display:flex;gap:8px;justify-content:center;margin-bottom:28px;width:100%;max-width:280px}
.pd{flex:1;height:4px;border-radius:3px;background:rgba(0,0,0,0.08);transition:background .4s}.pd.a{background:var(--g)}
.headline{font-size:clamp(26px,4vw,36px);font-weight:800;line-height:1.15;letter-spacing:-1px;margin-bottom:10px;text-align:center;color:var(--tx)}.headline .ac{color:var(--g)}
.sub{font-size:16px;color:var(--txm);text-align:center}
.q{font-size:clamp(20px,3vw,26px);font-weight:700;line-height:1.25;letter-spacing:-.3px;margin-bottom:24px;text-align:center;color:var(--tx)}
.sl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--g);margin-bottom:10px}
.sc{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%}
.mr{display:flex;gap:14px;margin-top:32px;flex-wrap:wrap;justify-content:center;width:100%}
.mb{flex:1;min-width:240px;max-width:320px;border:2px solid var(--cb);border-radius:16px;padding:24px 20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;background:#fff;transition:all .2s;font-family:inherit;color:var(--tx)}
.mb:hover{border-color:var(--g);box-shadow:0 4px 20px var(--gg)}.mb:active{transform:scale(.98)}
.mb .mi{font-size:36px}.mb .ml{font-size:18px;font-weight:700;line-height:1.3}.mb .ms{font-size:13px;color:var(--txm)}
.og{display:flex;flex-direction:column;gap:10px;width:100%;max-width:480px}
.ob{background:#fff;border:2px solid var(--cb);border-radius:var(--r);padding:16px 20px;font-size:18px;font-weight:600;color:var(--tx);cursor:pointer;transition:all .2s;text-align:center;font-family:inherit}
.ob:hover{border-color:var(--g)}.ob:active{transform:scale(.98)}.ob.a{border-color:var(--g);background:rgba(0,200,83,0.08);color:var(--tx)}
.tr{margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.tb{background:#fff;border:2px solid var(--cb);border-radius:10px;padding:12px 18px;font-size:15px;font-weight:500;color:var(--tx);cursor:pointer;transition:all .2s;font-family:inherit}.tb:hover{border-color:var(--g)}.tb.a{border-color:var(--g);background:rgba(0,200,83,0.08)}
.ti{width:100%;max-width:480px;padding:16px 20px;font-size:18px;font-weight:500;background:#fff;border:2px solid var(--cb);border-radius:var(--r);color:var(--tx);outline:none;font-family:inherit;text-align:center;transition:border .2s}.ti::placeholder{color:rgba(0,0,0,0.25)}.ti:focus{border-color:var(--g)}
.th{font-size:13px;color:var(--txm);margin-top:8px}
.bp{background:var(--g);border:none;border-radius:var(--r);padding:16px 40px;font-size:17px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 4px 20px var(--gg)}.bp:hover{box-shadow:0 6px 28px var(--gg)}.bp:active{transform:scale(.97)}.bp:disabled{opacity:.3;box-shadow:none}
.bg2{background:#fff;border:2px solid var(--cb);border-radius:var(--r);padding:14px 28px;font-size:15px;font-weight:600;color:var(--tx);cursor:pointer;font-family:inherit;transition:all .2s}.bg2:hover{border-color:var(--g)}
.lk{background:none;border:none;color:var(--txm);font-size:14px;cursor:pointer;padding:8px;font-family:inherit}
.sv{font-size:clamp(36px,6vw,48px);font-weight:800;color:var(--tx);margin:20px 0 10px;letter-spacing:-1px}
.slider-wrap{width:100%;max-width:480px;position:relative;padding:0 4px}
input[type="range"]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:rgba(0,0,0,0.08);border-radius:4px;outline:none;cursor:pointer;margin:0;display:block;touch-action:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:40px;height:40px;border-radius:50%;cursor:pointer;background:var(--g);box-shadow:0 2px 12px var(--gg);margin-top:-17px;border:3px solid #fff}
input[type="range"]::-webkit-slider-runnable-track{height:6px;border-radius:4px;background:rgba(0,0,0,0.08)}
.slab{display:flex;justify-content:space-between;width:100%;max-width:480px;color:var(--txm);font-size:12px;margin-top:4px}
.rl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--txm);margin-bottom:6px}
.rte{font-size:15px;color:var(--txm);margin-top:2px;margin-bottom:8px;font-weight:500;font-style:italic}
.cmp-wrap{width:100%;max-width:520px;margin:16px 0 6px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.cmp-gauge{flex:1;min-width:200px;max-width:250px;text-align:center}
.cmp-gauge .cg-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px}
.cmp-gauge .cg-val{font-size:clamp(32px,5vw,42px);font-weight:800;line-height:1;margin-top:0}
.cmp-gauge .cg-sub{font-size:11px;color:var(--txm);margin-top:2px}
.cmp-warn{text-align:center;margin:12px 0 4px;padding:10px 16px;background:rgba(255,59,48,0.06);border:1px solid rgba(255,59,48,0.15);border-radius:12px;font-size:14px;color:rgba(0,0,0,0.6);line-height:1.4}
.cmp-warn strong{color:#FF3B30;font-weight:700}
.cmp-boost{text-align:center;margin:4px 0 10px;padding:10px 16px;background:rgba(0,200,83,0.06);border:1px solid rgba(0,200,83,0.15);border-radius:12px;font-size:14px;color:rgba(0,0,0,0.6);line-height:1.4}
.cmp-boost strong{color:#00A344;font-weight:700}
.rg{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.ri{background:#fff;border:1px solid var(--cb);border-radius:12px;padding:12px 16px;min-width:120px;display:flex;flex-direction:column;gap:4px}
.ril{font-size:10px;color:var(--txm);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.riv{font-size:20px;font-weight:800;color:var(--tx)}
.rsub{font-size:15px;color:var(--txm);margin-top:4px;margin-bottom:12px}
.usp-section{width:100%;max-width:520px;margin-top:16px;margin-bottom:6px}
.usp-title{font-size:20px;font-weight:800;color:var(--g);text-align:center;margin-bottom:14px}
.usp-grid{display:flex;flex-direction:column;gap:6px}
.usp-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--cb);border-radius:12px;padding:12px 16px}
.usp-item .usp-icon{font-size:24px;flex-shrink:0;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(0,200,83,0.08);border-radius:10px}
.usp-item .usp-text{flex:1}
.usp-item .usp-h{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:1px}
.usp-item .usp-d{font-size:12px;color:var(--txm);line-height:1.4}
.cc{width:100%;max-width:520px;margin-top:14px;background:#fff;border:2px solid var(--cb);border-radius:16px;padding:18px 20px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit;color:var(--tx)}.cc:hover{border-color:var(--g)}
.cc .ci{font-size:24px;margin-bottom:6px}.cc .ct{font-size:16px;font-weight:700;line-height:1.3}
.bk{position:fixed;bottom:20px;left:20px;background:#fff;border:1px solid var(--cb);border-radius:10px;padding:10px 20px;font-size:14px;color:var(--txm);cursor:pointer;z-index:10;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.ov{position:fixed;inset:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.oc{background:#fff;border-radius:20px;padding:32px 28px;max-width:480px;width:100%;text-align:center;border:1px solid var(--cb);box-shadow:0 8px 40px rgba(0,0,0,0.1)}
.oc h2{font-size:22px;margin-bottom:4px;color:var(--tx)}.oc .os{font-size:14px;color:var(--txm);margin-bottom:20px}
.inf{width:100%;padding:14px 18px;font-size:16px;background:#fafafa;border:2px solid var(--cb);border-radius:10px;color:var(--tx);margin-bottom:10px;outline:none;font-family:inherit}.inf::placeholder{color:rgba(0,0,0,0.25)}.inf:focus{border-color:var(--g)}
.br{display:flex;gap:10px;margin-top:8px}.br>*{flex:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--g);color:#000;padding:12px 28px;border-radius:12px;font-size:15px;font-weight:700;box-shadow:0 6px 24px var(--gg);z-index:200;animation:tin .3s ease,tout .3s ease 2.2s forwards}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(20px)}}
.pw{text-align:center;margin-top:24px;opacity:0.4}
.loading-ov{position:fixed;inset:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px}
.loading-ov h2{font-size:22px;font-weight:800;color:var(--tx)}
.loading-ov p{font-size:15px;color:var(--txm);max-width:320px;text-align:center}
.loading-bar{width:280px;height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden;margin-top:8px}
.loading-bar .fill{height:100%;background:var(--g);border-radius:3px;width:0;animation:loadfill 2.8s ease forwards}
@keyframes loadfill{0%{width:0}30%{width:45%}60%{width:72%}85%{width:90%}100%{width:100%}}
.mail-send-card{width:100%;max-width:520px;margin-top:16px;background:#fff;border:2px solid rgba(0,200,83,0.2);border-radius:16px;padding:20px 24px;text-align:center}
.mail-send-card .msc-title{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:4px}
.mail-send-card .msc-desc{font-size:13px;color:var(--txm);margin-bottom:12px}
.mail-send-card .msc-email{font-size:14px;color:var(--g);font-weight:600;margin-bottom:12px}
</style>
</head>

// Calc
function calcPot(a){
  var p={fachkraft:55,spezialist:40,fuehrung:30,clevel:18},o={metro:45,mittel:55,laendlich:35};
  var g={unter:-12,markt:0,ueber:8},v={neu:5,kurz:0,mittel:-8,lang:-18};
  var r=((p[a.position]||40)+(o[a.standort]||45)+(a.remote?8:0)+(g[a.gehalt]||0)+(v[a.vakanz]||0))/1.6;
  return Math.max(8,Math.min(55,Math.round(r)));
}
function calcPotProdigy(ohne,a){
  var boost={fachkraft:28,spezialist:30,fuehrung:33,clevel:35};
  return Math.min(95,ohne+(boost[a.position]||30));
}
function getKonkurrenz(a){
  var base={metro:"Sehr hoch",mittel:"Hoch",laendlich:"Hoch"};
  if(a.position==="clevel"||a.position==="fuehrung") return "Extrem hoch";
  return base[a.standort]||"Hoch";
}
function calcVak(a){
  var f={fachkraft:.75,spezialist:1,fuehrung:1.5,clevel:2.5},m={kurz:2,mittel:4,lang:7};
  var jg=a.jahresgehalt||85000,mg=jg/12,fk=f[a.position]||1,mon=m[a.vakanz]||3;
  var vk=Math.round(mg*mon*.33*fk),pk=Math.round(mg*mon*.45),sk=a.fehlbesetzung?Math.round(jg*.25):0;

}

    '<path d="M18 120 A102 102 0 0 1 222 120" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="12" stroke-linecap="round"/>'+
    '<path d="M18 120 A102 102 0 0 1 222 120" fill="none" stroke="'+c+'" stroke-width="12" stroke-linecap="round" id="arc-'+id+'" stroke-dasharray="0 320" style="transition:stroke-dasharray 1.6s cubic-bezier(.22,1,.36,1)"/>'+
    '<line x1="120" y1="120" x2="46" y2="120" stroke="'+c+'" stroke-width="3" stroke-linecap="round" id="needle-'+id+'" style="transition:transform 1.6s cubic-bezier(.22,1,.36,1);transform-origin:120px 120px;transform:rotate(0deg)"/>'+
    '<circle cx="120" cy="120" r="4" fill="'+c+'"/></svg>';
}
function animGauge(gid,v){
  var arc=document.getElementById("arc-"+gid);

  if(arc) arc.setAttribute("stroke-dasharray",(v/100*320)+" 320");

}

// Counter animation
var ctrs={};
function animC(id,tgt,suf){
  if(ctrs[id]&&ctrs[id].t===tgt)return;ctrs[id]={t:tgt};var t0=performance.now();
  function tk(now){var p=Math.min((now-t0)/1600,1),e=1-Math.pow(1-p,3),el=document.getElementById(id);
    if(el)el.textContent=fmt(Math.round(e*tgt))+(suf||"");if(p<1)requestAnimationFrame(tk)}
  requestAnimationFrame(tk);
}

  var VL2={neu:"Noch nicht ausgeschrieben",kurz:"< 2 Monate",mittel:"2-4 Monate",lang:"> 4 Monate"};
  if(S.weg===1){var ohneL=calcPot(a),mitL=calcPotProdigy(ohneL,a);ergebnis="Ohne:"+ohneL+"% / Mit prodigy:"+mitL+"%";details="Konkurrenz:"+getKonkurrenz(a)+",Markt:"+(ML[a.position]||"-")+",Wechsel:"+(WL[a.gehalt]||"-")}
  else{var r=calcVak(a);ergebnis=fmt(r.gesamt)+" EUR Schaden";details="Vakanz:"+fmt(r.vakanzkosten)+" EUR,Prod:"+fmt(r.produktivitaet)+" EUR,Such:"+fmt(r.suchkosten)+" EUR"}

  sendToN8n({name:n,firma:f,email:e,telefon:t,stellentitel:a.stellentitel||"",stadt:a.stadt||"",vakanzdauer:VL2[a.vakanz]||"-",weg:S.weg===1?"Besetzungspotenzial":"Vakanzkosten",ergebnis:ergebnis,details:details,quelle:"website",timestamp:new Date().toISOString()});

  // Show loading overlay
  showLoading();
}

function showLoading(){
  var ov=document.createElement("div");ov.className="loading-ov";ov.id="loading-ov";
  ov.innerHTML='<img src="'+LOGO_SM+'" alt="prodigy" style="height:32px;margin-bottom:8px">'+
    '<h2>Vielen Dank f\u00FCr Ihre Angaben!</h2>'+
    '<p>Ihre Situation wird analysiert...</p>'+
    '<div class="loading-bar"><div class="fill"></div></div>';
  document.body.appendChild(ov);

  setTimeout(function(){
    var el=document.getElementById("loading-ov");
    if(el)el.remove();
    S.showMail=false;
    transition(function(){S.showResult=true});
  },3200);
}

function sendResultByMail(){
  var a=S.answers;
  var ergebnis,details;
  if(S.weg===1){var ohneL=calcPot(a),mitL=calcPotProdigy(ohneL,a);ergebnis="Ohne:"+ohneL+"% / Mit prodigy:"+mitL+"%";details="Konkurrenz:"+getKonkurrenz(a)}
  else{var r=calcVak(a);ergebnis=fmt(r.gesamt)+" EUR Schaden";details="Vakanz:"+fmt(r.vakanzkosten)+", Prod:"+fmt(r.produktivitaet)+", Such:"+fmt(r.suchkosten)}
  sendToN8n({email:S.leadEmail,aktion:"ergebnis_per_mail",weg:S.weg===1?"Besetzungspotenzial":"Vakanzkosten",stellentitel:a.stellentitel||"",ergebnis:ergebnis,details:details,quelle:"website",timestamp:new Date().toISOString()});
  showToast("\u2713 Ergebnis wird an "+S.leadEmail+" gesendet!");
}

function showToast(m){var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2600)}

render();
</script>
</body>
</html>
